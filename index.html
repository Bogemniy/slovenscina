<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Slovenščina — Карточки</title>
<style>
:root {
  --bg: #0f1923;
  --card: #1e3248;
  --card2: #243b53;
  --accent: #4ecdc4;
  --accent2: #44b8ab;
  --purple: #a78bfa;
  --purple2: #7c3aed;
  --red: #ff6b6b;
  --orange: #ff9f43;
  --text: #e8edf2;
  --dim: #5a7a94;
  --dim2: #7a8fa3;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: linear-gradient(145deg, #0f1923, #1a2a3a, #0d1520);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}
.container { max-width: 440px; margin: 0 auto; padding: 16px; }

/* === MENU === */
.menu-card {
  background: linear-gradient(135deg, var(--card), var(--card2));
  border-radius: 24px; padding: 40px 20px 32px; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
  border: 1px solid rgba(78,205,196,.1);
  margin-top: 40px;
}
.menu-flag { font-size: 48px; margin-bottom: 12px; }
.menu-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.menu-sub { font-size: 13px; color: var(--dim2); margin-bottom: 28px; }
.menu-btn {
  display: block; width: 100%; padding: 16px; font-size: 17px; font-weight: 700;
  border: none; border-radius: 14px; cursor: pointer; margin-bottom: 12px;
  font-family: inherit; transition: transform .1s;
}
.menu-btn:active { transform: scale(.97); }
.menu-btn.words { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0f1923; }
.menu-btn.verbs { background: linear-gradient(135deg, var(--purple), var(--purple2)); color: #fff; }
.menu-btn.table-btn {
  background: rgba(167,139,250,.1); color: var(--purple); border: 1px solid rgba(167,139,250,.2);
  font-size: 14px; padding: 12px; font-weight: 600;
}
.divider { height: 1px; background: rgba(255,255,255,.06); margin: 24px 0 16px; }
.verb-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px; }
.verb-chip {
  padding: 6px 12px; font-size: 12px; font-weight: 500;
  background: rgba(167,139,250,.1); color: #c4b5fd;
  border: 1px solid rgba(167,139,250,.2); border-radius: 10px;
  cursor: pointer; font-family: inherit;
}
.verb-chip:active { background: rgba(167,139,250,.25); }

/* === QUIZ === */
.top-bar { display: flex; justify-content: space-between; margin-bottom: 6px; }
.progress-text { font-size: 14px; color: var(--dim2); font-weight: 500; }
.score-text { font-size: 14px; font-weight: 600; }
.score-words { color: var(--accent); }
.score-verbs { color: var(--purple); }
.progress-track { height: 4px; border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
.progress-track.words { background: #1e3044; }
.progress-track.verbs { background: #2a1f45; }
.progress-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.progress-fill.words { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.progress-fill.verbs { background: linear-gradient(90deg, var(--purple), var(--purple2)); }
.streak { font-size: 14px; color: var(--orange); font-weight: 600; margin-bottom: 12px; text-align: center; }

.card {
  border-radius: 20px; padding: 32px 20px 24px; text-align: center; margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.04);
}
.card.words { background: linear-gradient(135deg, var(--card), var(--card2)); border: 1px solid rgba(78,205,196,.1); }
.card.verbs { background: linear-gradient(135deg, #2a1f45, #352a55); border: 1px solid rgba(167,139,250,.1); }
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin-bottom: 10px; }
.card-label.words { color: var(--accent); }
.card-label.verbs { color: var(--purple2); }
.card-word { font-size: 30px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.card-sub { font-size: 14px; color: var(--dim); margin-bottom: 16px; }
.card-hint { font-size: 13px; color: var(--dim); }

.pronoun-box {
  display: inline-block; padding: 8px 20px; border-radius: 12px; margin-bottom: 14px;
  background: rgba(167,139,250,.12); border: 1px solid rgba(167,139,250,.2);
}
.pronoun-label { font-size: 17px; font-weight: 700; color: #c4b5fd; }
.neg-badge {
  display: inline-block; padding: 4px 14px; margin-bottom: 12px;
  background: rgba(255,107,107,.15); color: var(--red); border-radius: 8px;
  font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
  border: 1px solid rgba(255,107,107,.25);
}

.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  width: 100%; padding: 15px 18px; font-size: 17px; font-weight: 500;
  border-radius: 14px; cursor: pointer; text-align: center;
  font-family: inherit; transition: all .15s ease; border: 1px solid;
}
.opt-btn.words { background: rgba(30,50,72,.7); color: #d0dae4; border-color: rgba(78,205,196,.15); }
.opt-btn.verbs { background: rgba(42,31,69,.7); color: #d0d0e8; border-color: rgba(167,139,250,.15); }
.opt-btn:disabled { cursor: default; }
.opt-btn.correct.words { background: rgba(78,205,196,.2); border-color: var(--accent); color: var(--accent); font-weight: 700; }
.opt-btn.correct.verbs { background: rgba(167,139,250,.2); border-color: var(--purple); color: var(--purple); font-weight: 700; }
.opt-btn.wrong { background: rgba(255,107,107,.15); border-color: var(--red); color: var(--red); }
.opt-btn.faded { opacity: .4; }

/* === RESULT === */
.result-card {
  border-radius: 24px; padding: 40px 20px 28px; text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,.3); margin-top: 20px;
}
.result-card.words { background: linear-gradient(135deg, var(--card), var(--card2)); border: 1px solid rgba(78,205,196,.1); }
.result-card.verbs { background: linear-gradient(135deg, #2a1f45, #352a55); border: 1px solid rgba(167,139,250,.1); }
.result-emoji { font-size: 48px; margin-bottom: 12px; }
.result-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.result-score { font-size: 44px; font-weight: 800; margin-bottom: 4px; }
.result-score.words { color: var(--accent); }
.result-score.verbs { color: var(--purple); }
.result-pct { font-size: 16px; color: var(--dim2); margin-bottom: 16px; }
.streak-badge {
  display: inline-block; padding: 6px 16px; background: rgba(255,159,67,.15);
  color: var(--orange); border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 20px;
}
.mistakes-block { background: rgba(0,0,0,.2); border-radius: 14px; padding: 16px; margin-bottom: 20px; text-align: left; }
.mistakes-title { font-size: 13px; color: var(--dim2); margin-bottom: 10px; font-weight: 600; }
.mistake-row { display: flex; align-items: center; gap: 6px; padding: 5px 0; font-size: 14px; }
.mistake-sl { color: var(--accent); font-weight: 600; flex: 1; }
.mistake-sl.verbs { color: #c4b5fd; }
.mistake-arrow { color: #3a5068; }
.mistake-ru { color: var(--text); flex: 1; text-align: right; }

.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn-retry {
  padding: 14px 20px; font-size: 15px; font-weight: 600;
  background: transparent; color: var(--orange); border: 1.5px solid var(--orange);
  border-radius: 14px; cursor: pointer; font-family: inherit;
}
.btn-new {
  padding: 14px 20px; font-size: 15px; font-weight: 600;
  border: none; border-radius: 14px; cursor: pointer; font-family: inherit;
}
.btn-new.words { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0f1923; }
.btn-new.verbs { background: linear-gradient(135deg, var(--purple), var(--purple2)); color: #fff; }
.btn-menu {
  padding: 14px 20px; font-size: 15px; font-weight: 600;
  background: transparent; color: var(--dim2); border: 1.5px solid var(--dim2);
  border-radius: 14px; cursor: pointer; font-family: inherit;
}

/* === MATCHING === */
.match-cols { display: flex; gap: 12px; justify-content: center; }
.match-col { display: flex; flex-direction: column; gap: 10px; flex: 1; max-width: 200px; }
.match-tile {
  padding: 14px 10px; font-size: 15px; font-weight: 500; text-align: center;
  border-radius: 12px; cursor: pointer; font-family: inherit;
  transition: all .15s; user-select: none; -webkit-user-select: none;
  border: 2px solid; min-height: 48px; display: flex; align-items: center; justify-content: center;
}
.match-tile.sl { background: rgba(30,50,72,.7); color: #d0dae4; border-color: rgba(78,205,196,.2); }
.match-tile.ru { background: rgba(42,31,69,.5); color: #d0d0e8; border-color: rgba(167,139,250,.2); }
.match-tile.selected { border-width: 3px; }
.match-tile.sl.selected { border-color: var(--accent); background: rgba(78,205,196,.15); color: var(--accent); }
.match-tile.ru.selected { border-color: var(--purple); background: rgba(167,139,250,.15); color: var(--purple); }
.match-tile.correct-match { opacity: .25; pointer-events: none; border-color: transparent; }
.match-tile.wrong-match { border-color: var(--red); background: rgba(255,107,107,.15); color: var(--red); }
.match-tile:active { transform: scale(.95); }
.match-round { font-size: 13px; color: var(--dim2); text-align: center; margin-bottom: 16px; }
.menu-btn.match { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f1923; }
.score-match { color: #f59e0b; }
.progress-track.match { background: #2d2010; }
.progress-fill.match { background: linear-gradient(90deg, #f59e0b, #d97706); }
.result-card.match { background: linear-gradient(135deg, #2d2410, #3d3015); border: 1px solid rgba(245,158,11,.1); }
.result-score.match { color: #f59e0b; }
.btn-new.match { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f1923; }

/* === SENTENCE BUILDER === */
.sent-card {
  background: linear-gradient(135deg, #1e2d1e, #2a3d2a);
  border-radius: 20px; padding: 28px 20px 24px; text-align: center; margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
  border: 1px solid rgba(76,175,80,.1);
}
.sent-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #66bb6a; font-weight: 600; margin-bottom: 12px; }
.sent-ru { font-size: 20px; color: #fff; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }

.answer-area {
  min-height: 52px; border-bottom: 2px solid rgba(76,175,80,.3);
  margin: 16px 0; padding: 8px 4px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
}
.answer-area .tile { background: rgba(76,175,80,.2); border-color: rgba(76,175,80,.4); }

.word-bank { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 8px 0; }

.tile {
  padding: 10px 16px; font-size: 16px; font-weight: 500;
  background: rgba(30,50,40,.7); color: #d0e8d4;
  border: 1.5px solid rgba(76,175,80,.2); border-radius: 12px;
  cursor: pointer; font-family: inherit; transition: all .15s;
  user-select: none; -webkit-user-select: none;
}
.tile:active { transform: scale(.95); }
.tile.used { opacity: .2; pointer-events: none; }
.tile.correct-tile { background: rgba(76,175,80,.25); border-color: #66bb6a; color: #66bb6a; }
.tile.wrong-tile { background: rgba(255,107,107,.15); border-color: var(--red); color: var(--red); }

.sent-hint { font-size: 13px; color: #5a7a5a; margin-top: 8px; }
.sent-correct-answer { font-size: 16px; color: #66bb6a; font-weight: 600; margin-top: 12px; }

.btn-check {
  display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, #66bb6a, #4caf50); color: #0f1923;
  border: none; border-radius: 14px; cursor: pointer; font-family: inherit; margin-top: 12px;
}
.btn-check:disabled { opacity: .4; cursor: default; }
.btn-next { background: linear-gradient(135deg, #66bb6a, #4caf50); color: #0f1923; }
.btn-new.sents { background: linear-gradient(135deg, #66bb6a, #4caf50); color: #0f1923; }
.score-sents { color: #66bb6a; }
.progress-track.sents { background: #1e3022; }
.progress-fill.sents { background: linear-gradient(90deg, #66bb6a, #4caf50); }
.result-card.sents { background: linear-gradient(135deg, #1e2d1e, #2a3d2a); border: 1px solid rgba(76,175,80,.1); }
.result-score.sents { color: #66bb6a; }
.menu-btn.sents { background: linear-gradient(135deg, #66bb6a, #4caf50); color: #0f1923; }

/* === TABLE (original) === */
.table-card {
  background: linear-gradient(135deg, #2a1f45, #352a55); border-radius: 24px;
  padding: 20px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.4);
  border: 1px solid rgba(167,139,250,.1);
}
.back-btn { background: none; border: none; color: var(--purple); font-size: 14px; cursor: pointer; font-family: inherit; margin-bottom: 12px; font-weight: 600; }
.table-inf { font-size: 26px; font-weight: 700; }
.table-ru { font-size: 15px; color: #8b7aad; margin-bottom: 16px; }
.table-header { display: flex; justify-content: space-between; padding: 6px 14px; }
.table-header span { font-size: 11px; color: #5a4a78; }
.table-header .pos { color: var(--purple); }
.table-header .neg { color: var(--red); }
.table-row { display: flex; justify-content: space-between; padding: 8px 14px; border-radius: 8px; }
.table-row:nth-child(even) { background: rgba(78,205,196,.05); }
.table-pronoun { color: #8b7aad; font-size: 13px; font-weight: 500; flex: 1; }
.table-form { color: var(--purple); font-size: 15px; font-weight: 700; flex: 1; text-align: center; }
.table-neg { color: #ff8a8a; font-size: 14px; flex: 1; text-align: right; }
</style>
</head>

{inf:"zbirati se",ru:"собираться (несов.)",forms:{jaz:"se zbiram",ti:"se zbiraš","on/ona/ono":"se zbira","midva/medve":"se zbirava","vidva/vedve":"se zbirata","onidva/onidve":"se zbirata","mi/me":"se zbiramo","vi/ve":"se zbirate","oni/one":"se zbirajo"}},
{inf:"pomeniti",ru:"значить, означать",forms:{jaz:"pomenim",ti:"pomeniš","on/ona/ono":"pomeni","midva/medve":"pomeniva","vidva/vedve":"pomenita","onidva/onidve":"pomenita","mi/me":"pomenimo","vi/ve":"pomenite","oni/one":"pomenijo"}}

<script>
// ============================================================
// ENGINE
// ============================================================
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
const $=id=>document.getElementById(id);
const app=document.getElementById('app');

// --- PERSISTENCE ---
function saveQueue(key,queue,seen){
  try{
    const data=queue.map(w=>{
      if(w.verb)return w.verb.inf+"|"+w.pronoun;
      return w.sl;
    });
    // Track all words in current WORDS/combos that are NOT in queue = already seen
    let seen_list;
    if(key==="wq"){
      const qSet=new Set(data);
      seen_list=WORDS.filter(w=>!qSet.has(w.sl)).map(w=>w.sl);
    } else {
      const qSet=new Set(data);
      seen_list=[];
      VERBS.forEach(v=>PRONOUNS.forEach(p=>{const k=v.inf+"|"+p;if(!qSet.has(k))seen_list.push(k);}));
    }
    localStorage.setItem(key,JSON.stringify({queue:data,seen,seen_list,total:key==="wq"?WORDS.length:VERBS.length*9}));
  }catch(e){}
}
// --- SPACED REPETITION ---
// wordProgress: {sl: {level, nextDue, mistakes, mastered, lastSeen}}
// Levels: 0=new, 1-5=learning. nextDue = ms timestamp.
// Intervals (level→ms until next review):
//   0: 0 (immediately/this round), 1: 10min, 2: 1day, 3: 3days, 4: 7days, 5: 30days
const SR_INTERVALS=[0, 10*60*1000, 24*3600*1000, 3*24*3600*1000, 7*24*3600*1000, 30*24*3600*1000];
let wordProgress={};
function loadWordProgress(){
  try{const d=JSON.parse(localStorage.getItem("wp"));if(d&&typeof d==="object")wordProgress=d;}catch(e){}
}
function saveWordProgress(){
  try{localStorage.setItem("wp",JSON.stringify(wordProgress));}catch(e){}
}
function getWP(sl){
  if(!wordProgress[sl])wordProgress[sl]={level:0,nextDue:0,mistakes:0,mastered:false,lastSeen:0,streak:0};
  return wordProgress[sl];
}
function updateWP(sl, correct){
  const p=getWP(sl);
  p.lastSeen=Date.now();
  if(correct){
    p.streak=(p.streak||0)+1;
    p.level=Math.min(5,p.level+1);
    // Mastered: 3 right in a row at level 5
    if(p.level>=5 && p.streak>=3) p.mastered=true;
  }else{
    p.streak=0;
    p.level=0;
    p.mistakes=(p.mistakes||0)+1;
    p.mastered=false;
  }
  p.nextDue=Date.now()+SR_INTERVALS[p.level];
  saveWordProgress();
}
function unmasterWord(sl){
  const p=getWP(sl);p.mastered=false;p.level=Math.max(0,p.level-2);p.streak=0;
  p.nextDue=Date.now();saveWordProgress();
}
// Bucket words for stats and quiz selection
function bucketWords(){
  const now=Date.now();
  const buckets={new:[],due:[],learning:[],mastered:[]};
  WORDS.forEach(w=>{
    const p=wordProgress[w.sl];
    if(!p||p.lastSeen===0){buckets.new.push(w);return;}
    if(p.mastered){buckets.mastered.push(w);return;}
    if(p.nextDue<=now){buckets.due.push(w);return;}
    buckets.learning.push(w);
  });
  return buckets;
}
loadWordProgress();

function loadWordQueue(){
  try{
    const d=JSON.parse(localStorage.getItem("wq"));
    if(d&&d.queue&&d.queue.length>0){
      // Restore queue from saved state
      const restored=d.queue.map(sl=>WORDS.find(w=>w.sl===sl)).filter(Boolean);
      // Find words that were already seen (not in queue anymore)
      const queueSls=new Set(d.queue);
      const savedTotal=d.total||WORDS.length; // total words when last saved
      
      // If new words were added since last save, add them to the queue
      const newWords=WORDS.filter(w=>!queueSls.has(w.sl)&&!d.seen_list?.includes(w.sl));
      
      wordQueue=[...restored,...shuffle(newWords)];
      wordsSeen=d.seen||0;
      return;
    }
  }catch(e){}
  wordQueue=shuffle([...WORDS]);wordsSeen=0;
}
function loadVerbQueue(){
  try{
    const d=JSON.parse(localStorage.getItem("vq"));
    if(d&&d.queue&&d.queue.length>0){
      const restored=d.queue.map(k=>{const[inf,p]=k.split("|");const v=VERBS.find(x=>x.inf===inf);return v&&p?{verb:v,pronoun:p}:null;}).filter(Boolean);
      // Find new verb combos not in saved queue or seen list
      const queueKeys=new Set(d.queue);
      const allCombos=[];VERBS.forEach(v=>PRONOUNS.forEach(p=>allCombos.push({verb:v,pronoun:p})));
      const newCombos=allCombos.filter(c=>{const k=c.verb.inf+"|"+c.pronoun;return!queueKeys.has(k)&&!d.seen_list?.includes(k);});
      
      verbQueue=[...restored,...shuffle(newCombos)];
      verbsSeen=d.seen||0;
      return;
    }
  }catch(e){}
  let combos=[];VERBS.forEach(v=>PRONOUNS.forEach(p=>combos.push({verb:v,pronoun:p})));
  verbQueue=shuffle(combos);verbsSeen=0;
}

// --- WORDS ENGINE ---
let wordQueue=[];
let wordsSeen=0;
loadWordQueue();
function genWordOptions(w,dir){
  const isSl=dir==="sl2ru";const correct=isSl?w.ru:w.sl;const MAP=isSl?CAT_MAP:CAT_MAP_SL;
  let pool=(MAP[w.cat]||[]).filter(x=>x!==correct);
  if(pool.length<4){const rel=RELATED[w.cat]||[];for(const rc of rel)pool=[...pool,...(MAP[rc]||[]).filter(x=>x!==correct&&!pool.includes(x))];}
  return shuffle([correct,...shuffle(pool).slice(0,2)]);
}
function genWordQuiz(n=10, mode="all"){
  let picked=[];
  const buckets=bucketWords();
  if(mode==="new"){
    // Only words never seen
    if(buckets.new.length===0)return [];
    picked=shuffle(buckets.new).slice(0,n);
  }else if(mode==="review"){
    // 70% due, 20% top mistakes (any non-mastered), 10% context (level >=4)
    if(buckets.due.length===0 && buckets.learning.length===0)return [];
    const dueSorted=[...buckets.due].sort((a,b)=>(getWP(b.sl).mistakes||0)-(getWP(a.sl).mistakes||0));
    const nDue=Math.ceil(n*0.7), nMistakes=Math.floor(n*0.2);
    const duePart=dueSorted.slice(0,nDue);
    const dueSls=new Set(duePart.map(w=>w.sl));
    // Top mistakes from non-mastered, not already in due slice
    const mistakePool=[...buckets.due,...buckets.learning].filter(w=>!dueSls.has(w.sl)&&(getWP(w.sl).mistakes||0)>0).sort((a,b)=>(getWP(b.sl).mistakes||0)-(getWP(a.sl).mistakes||0));
    const mistakePart=mistakePool.slice(0,nMistakes);
    picked=[...duePart,...mistakePart];
    // Fill rest with random due/learning if any seats left
    if(picked.length<n){
      const usedSls=new Set(picked.map(w=>w.sl));
      const fillPool=shuffle([...buckets.due,...buckets.learning].filter(w=>!usedSls.has(w.sl)));
      picked=[...picked,...fillPool.slice(0,n-picked.length)];
    }
    picked=shuffle(picked);
  }else{
    // "all" — legacy queue-based behavior
    if(wordQueue.length<n){wordQueue=shuffle([...WORDS]);wordsSeen=0;}
    picked=wordQueue.splice(0,n);
    wordsSeen+=picked.length;
    saveQueue("wq",wordQueue,wordsSeen);
  }
  return picked.map((w,i)=>{
    const dir=i%2===0?"sl2ru":"ru2sl";
    const card={...w,dir,options:genWordOptions(w,dir)};
    // Context card: level >=4, 30% chance, only if a sentence contains this slovenian word
    const p=wordProgress[w.sl];
    if(p && p.level>=4 && Math.random()<0.3){
      const ctx=findContextSentence(w);
      if(ctx)card.context=ctx;
    }
    return card;
  });
}
function findContextSentence(w){
  // Find a sentence in SENTENCES that contains the slovenian word as a token
  const target=w.sl.toLowerCase();
  // Skip multiword phrases for now (too restrictive otherwise)
  if(target.indexOf(" ")>=0)return null;
  for(const s of shuffle([...SENTENCES])){
    const tokens=s.sl.toLowerCase().match(/[a-zčšžć]+/gi)||[];
    if(tokens.includes(target)){
      // Build a cloze: replace target word in original with ___
      const re=new RegExp("\\b"+w.sl.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+"\\b","i");
      const blanked=s.sl.replace(re,"___");
      return {sentence:blanked, ru:s.ru};
    }
  }
  return null;
}

// --- VERBS ENGINE ---
let verbQueue=[];
let verbsSeen=0;
loadVerbQueue();
function genVerbOptions(v,p,neg){
  const getF=(v,p)=>neg?getNegForm(v,p):v.forms[p];
  const correct=getF(v,p);
  const others=PRONOUNS.filter(x=>x!==p).map(x=>getF(v,x)).filter(x=>x!==correct);
  return shuffle([correct,...shuffle([...new Set(others)]).slice(0,2)]);
}
function genVerbQuiz(n=10){
  if(verbQueue.length<n){
    let combos=[];VERBS.forEach(v=>PRONOUNS.forEach(p=>combos.push({verb:v,pronoun:p})));
    verbQueue=shuffle(combos);verbsSeen=0;
  }
  const picked=verbQueue.splice(0,n);
  verbsSeen+=picked.length;
  saveQueue("vq",verbQueue.map(q=>({sl:null,verb:q.verb,pronoun:q.pronoun})),verbsSeen);
  // Reorder: no consecutive same pronoun
  const reordered=[];const rem=[...picked];
  while(rem.length>0){const last=reordered.length?reordered[reordered.length-1].pronoun:null;const idx=rem.findIndex(q=>q.pronoun!==last);if(idx>=0)reordered.push(rem.splice(idx,1)[0]);else reordered.push(rem.shift());}
  return reordered.map((q,i)=>{const neg=i%3===0;return{...q,negative:neg,options:genVerbOptions(q.verb,q.pronoun,neg)};});
}

// ============================================================
// MATCHING GAME
// ============================================================
let matchQueue=[];
function genMatchRound(){
  if(matchQueue.length<5)matchQueue=shuffle([...WORDS]);
  const picked=matchQueue.splice(0,5);
  return{
    pairs:picked.map(w=>({sl:w.sl,ru:w.ru,matched:false})),
    slOrder:shuffle([0,1,2,3,4]),
    ruOrder:shuffle([0,1,2,3,4]),
    selectedSl:null,
    selectedRu:null,
    wrongPair:null,
    mistakes:0
  };
}
function startMatch(){
  state={mode:"match",rounds:[],current:0,totalScore:0,totalMistakes:0};
  for(let i=0;i<6;i++)state.rounds.push(genMatchRound());
  renderMatch();
}
function renderMatch(){
  const round=state.rounds[state.current];
  const allMatched=round.pairs.every(p=>p.matched);
  
  let leftHtml='';
  round.slOrder.forEach(function(pi){
    const p=round.pairs[pi];
    let cls='match-tile sl';
    if(p.matched)cls+=' correct-match';
    else if(state.selectedSl===pi)cls+=' selected';
    if(round.wrongPair&&round.wrongPair.sl===pi&&!p.matched)cls+=' wrong-match';
    leftHtml+='<div class="'+cls+'" onclick="pickSl('+pi+')">'+p.sl+'</div>';
  });
  
  let rightHtml='';
  round.ruOrder.forEach(function(pi){
    const p=round.pairs[pi];
    let cls='match-tile ru';
    if(p.matched)cls+=' correct-match';
    else if(state.selectedRu===pi)cls+=' selected';
    if(round.wrongPair&&round.wrongPair.ru===pi&&!p.matched)cls+=' wrong-match';
    rightHtml+='<div class="'+cls+'" onclick="pickRu('+pi+')">'+p.ru+'</div>';
  });
  
  app.innerHTML='<div>'+
    '<div class="top-bar"><span class="progress-text">'+(state.current+1)+'/'+state.rounds.length+'</span><span class="score-text score-match">✓ '+state.totalScore+'</span></div>'+
    '<div class="progress-track match"><div class="progress-fill match" style="width:'+(state.current/state.rounds.length*100)+'%"></div></div>'+
    '<div class="match-round">Соедини пары</div>'+
    '<div class="match-cols"><div class="match-col">'+leftHtml+'</div><div class="match-col">'+rightHtml+'</div></div>'+
    (allMatched?'<button class="btn-check btn-next" style="margin-top:20px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#0f1923" onclick="nextMatchRound()">Далее →</button>':'')+
  '</div>';
}
function pickSl(i){
  const round=state.rounds[state.current];
  if(round.pairs[i].matched)return;
  round.wrongPair=null;
  state.selectedSl=i;
  if(state.selectedRu!==null)checkMatch();
  else renderMatch();
}
function pickRu(i){
  const round=state.rounds[state.current];
  if(round.pairs[i].matched)return;
  round.wrongPair=null;
  state.selectedRu=i;
  if(state.selectedSl!==null)checkMatch();
  else renderMatch();
}
function checkMatch(){
  const round=state.rounds[state.current];
  const si=state.selectedSl;const ri=state.selectedRu;
  if(si===ri){
    round.pairs[si].matched=true;
    state.totalScore++;
    state.selectedSl=null;state.selectedRu=null;
    renderMatch();
  }else{
    round.wrongPair={sl:si,ru:ri};
    round.mistakes++;
    state.totalMistakes++;
    renderMatch();
    setTimeout(function(){
      round.wrongPair=null;
      state.selectedSl=null;state.selectedRu=null;
      renderMatch();
    },800);
  }
}
function nextMatchRound(){
  if(state.current+1>=state.rounds.length){renderMatchResult();return;}
  state.current++;
  state.selectedSl=null;state.selectedRu=null;
  renderMatch();
}
function renderMatchResult(){
  const total=state.rounds.length*5;
  const pct=Math.round(state.totalScore/total*100);
  const emoji=state.totalMistakes===0?"🏆":state.totalMistakes<=3?"🌟":state.totalMistakes<=6?"👍":"💪";
  app.innerHTML='<div class="result-card match">'+
    '<div class="result-emoji">'+emoji+'</div><div class="result-title">Раунд окончен!</div>'+
    '<div class="result-score match">'+state.totalScore+'/'+total+'</div>'+
    '<div class="result-pct">Ошибок: '+state.totalMistakes+'</div>'+
    '<div class="btn-row" style="margin-top:20px">'+
    '<button class="btn-new match" onclick="startMatch()">Новый раунд</button>'+
    '<button class="btn-menu" onclick="goMenu()">Меню</button>'+
    '</div></div>';
}

  </div>`:'';
  // Show correct answer when revealed via "Не помню"
  const revealHTML=revealed?`<div style="background:#fff8e1;border:1px solid #ffd966;border-radius:10px;padding:12px;margin-bottom:10px;text-align:center"><div style="font-size:11px;color:#8a6a20;margin-bottom:4px">Правильный ответ:</div><div style="font-size:18px;font-weight:600;color:#5a4a10">${ans}</div></div>`:'';
  app.innerHTML=`<div>
    <div class="top-bar"><span class="progress-text">${current+1}/${cards.length}</span><span style="font-size:11px;color:#4a6278">${srMode==="new"?"новое":srMode==="review"?"повтор":"всё подряд"} · ${lvlBar}</span><span class="score-text score-words">✓ ${score}</span></div>

function selfAnswer(known){
  // User self-assessed: known=true means "I knew it", false="I don't remember"
  const c=state.cards[state.current];
  if(known){
    state.score++;state.streak++;state.bestStreak=Math.max(state.bestStreak,state.streak);
    updateWP(c.sl,true);
    state.selected=state._ctxCorrect||(c.dir==="sl2ru"?c.ru:c.sl); // mark "selected" so options show green
    renderWordsQuiz();
    setTimeout(advanceWord,700);
  }else{
    state.streak=0;state.mistakes.push({sl:c.sl,ru:c.ru});
    updateWP(c.sl,false);
    state.revealed=true;
    renderWordsQuiz();
  }
}
function advanceWord(){
  if(state.current+1>=state.cards.length){state.mode="words-result";renderWordsResult();}
  else{state.current++;state.selected=null;state.revealed=false;state._ctxCorrect=null;renderWordsQuiz();}
}
function selectWord(i){
  if(state.selected!==null||state.revealed)return;
  const c=state.cards[state.current];
  const ans=state._ctxCorrect||(c.dir==="sl2ru"?c.ru:c.sl);
  state.selected=c.options[i];
  const correct=state.selected===ans;
  if(correct){state.score++;state.streak++;state.bestStreak=Math.max(state.bestStreak,state.streak);}
  else{state.streak=0;state.mistakes.push({sl:c.sl,ru:c.ru});}
  updateWP(c.sl,correct);
  renderWordsQuiz();
  setTimeout(advanceWord,900);
}

  const{cards,score,bestStreak,mistakes,srMode}=state;const pct=Math.round(score/cards.length*100);

  state.selected=c.options[i];
  if(state.selected===correctAns){state.score++;state.streak++;state.bestStreak=Math.max(state.bestStreak,state.streak);}
  else{state.streak=0;state.mistakes.push(c);}
  renderVerbsQuiz();
  setTimeout(()=>{if(state.current+1>=state.cards.length){state.mode="verbs-result";renderVerbsResult();}else{state.current++;state.selected=null;renderVerbsQuiz();}},900);
}
function renderVerbsResult(){
  const{cards,score,bestStreak,mistakes}=state;const pct=Math.round(score/cards.length*100);
  const emoji=pct===100?"🏆":pct>=80?"🌟":pct>=60?"👍":"💪";
  app.innerHTML=`<div class="result-card verbs">
    <div class="result-emoji">${emoji}</div><div class="result-title">Раунд окончен!</div>
    <div class="result-score verbs">${score}/${cards.length}</div><div class="result-pct">${pct}% правильно</div>
    ${bestStreak>1?`<div class="streak-badge">Лучшая серия: ${bestStreak} подряд</div>`:''}
    ${mistakes.length?`<div class="mistakes-block"><div class="mistakes-title">Повтори:</div>${mistakes.map(m=>`<div class="mistake-row"><span class="mistake-sl verbs">${m.verb.inf}${m.negative?" ✗":""}</span><span style="color:#8b7aad;font-size:12px">${PRONOUN_SHORT[m.pronoun]}</span><span class="mistake-arrow">→</span><span class="mistake-ru">${m.negative?getNegForm(m.verb,m.pronoun):m.verb.forms[m.pronoun]}</span></div>`).join('')}</div>`:''}
    <div class="btn-row">
      ${mistakes.length?`<button class="btn-retry" onclick="retryVerbMistakes()">Повторить ошибки</button>`:''}
      <button class="btn-new verbs" onclick="startVerbs()">Новый раунд</button>
      <button class="btn-menu" onclick="goMenu()">Меню</button>
    </div>
  </div>`;
}
function retryVerbMistakes(){
  const cards=shuffle(state.mistakes).map(q=>({verb:q.verb,pronoun:q.pronoun,negative:q.negative,options:genVerbOptions(q.verb,q.pronoun,q.negative)}));
  state={mode:"verbs-quiz",cards,current:0,selected:null,score:0,mistakes:[],streak:0,bestStreak:0};
  renderVerbsQuiz();
}

// --- VERB TABLE ---
function showVerbList(){
  app.innerHTML=`<div class="table-card">
    <button class="back-btn" onclick="goMenu()">← Меню</button>
    <div style="font-size:20px;font-weight:700;margin-bottom:16px">Таблицы спряжений</div>
    <div class="verb-grid">${VERBS.map((v,i)=>`<button class="verb-chip" onclick="showVerbTable(${i})">${v.inf}</button>`).join('')}</div>
  </div>`;
}
function showVerbTable(i){
  const v=VERBS[i];
  app.innerHTML=`<div class="table-card">
    <button class="back-btn" onclick="showVerbList()">← Назад</button>
    <div class="table-inf">${v.inf}</div><div class="table-ru">${v.ru}</div>
    <div class="table-header"><span style="flex:1">местоимение</span><span class="pos" style="flex:1;text-align:center">✓</span><span class="neg" style="flex:1;text-align:right">✗</span></div>
    ${PRONOUNS.map((p,j)=>`<div class="table-row"><span class="table-pronoun">${p}</span><span class="table-form">${v.forms[p]}</span><span class="table-neg">${getNegForm(v,p)}</span></div>`).join('')}
    <div style="margin-top:16px"><button class="back-btn" onclick="showVerbList()">← Все глаголы</button></div>
  </div>`;
}

// --- SENTENCE BUILDER ---
function startSents(){
  state={mode:"sents-quiz",cards:genSentQuiz(8),current:0,score:0,mistakes:[]};
  renderSentQuiz();
}
function renderSentQuiz(){
  const{cards,current,score}=state;const c=cards[current];
  
  // Build answer area
  let answerHtml='';
  if(c.answer.length===0)answerHtml='<span style="color:#3a5a3a;font-size:14px">Нажми на слова ниже</span>';
  else c.answer.forEach(function(w,i){
    let cls='tile';
    if(c.checked){
      if(c.correct)cls+=' correct-tile';
      else{
        // Check if this specific position is correct
        if(i<c.sl.length&&w===c.sl[i])cls+=' correct-tile';
        else cls+=' wrong-tile';
      }
    }
    const click=c.checked?'':('removeTile('+i+')');
    answerHtml+='<span class="'+cls+'" onclick="'+click+'">'+w+'</span>';
  });
  
  // Track which bank tiles are used
  const usedIdxs=[];
  c.answer.forEach(function(aw){
    for(let ti=0;ti<c.tiles.length;ti++){if(c.tiles[ti]===aw&&usedIdxs.indexOf(ti)===-1){usedIdxs.push(ti);break;}}
  });
  
  let bankHtml='';
  c.tiles.forEach(function(w,i){
    const isUsed=usedIdxs.indexOf(i)>=0;
    let cls='tile';if(isUsed)cls+=' used';
    const click=(c.checked||isUsed)?'':('addTile('+i+')');
    bankHtml+='<span class="'+cls+'" onclick="'+click+'">'+w+'</span>';
  });
  
  let bottomHtml='';
  if(c.checked){
    if(c.correct)bottomHtml='<div style="text-align:center"><div style="color:#66bb6a;font-size:18px;font-weight:700;margin:12px 0">Правильно! ✓</div></div>';
    else bottomHtml='<div style="text-align:center"><div style="color:#ff6b6b;font-size:16px;margin:8px 0">Правильный ответ:</div><div class="sent-correct-answer">'+c.sl.join(' ')+'</div></div>';
    bottomHtml+='<button class="btn-check btn-next" onclick="nextSent()">Далее →</button>';
  }else{
    const dis=c.answer.length===0?'disabled':'';
    bottomHtml='<button class="btn-check" '+dis+' onclick="checkSent()">Проверить</button>';
  }
  
  app.innerHTML='<div>'+
    '<div class="top-bar"><span class="progress-text">'+(current+1)+'/'+cards.length+'</span><span class="score-text score-sents">✓ '+score+'</span></div>'+
    '<div class="progress-track sents"><div class="progress-fill sents" style="width:'+(current/cards.length*100)+'%"></div></div>'+
    '<div class="sent-card"><div class="sent-label">Переведи</div><div class="sent-ru">'+c.ru+'</div></div>'+
    '<div class="answer-area">'+answerHtml+'</div>'+
    '<div class="word-bank">'+bankHtml+'</div>'+
    bottomHtml+
  '</div>';
}
function addTile(bankIdx){
  const c=state.cards[state.current];if(c.checked)return;
  c.answer.push(c.tiles[bankIdx]);
  renderSentQuiz();
}
function removeTile(ansIdx){
  const c=state.cards[state.current];if(c.checked)return;
  c.answer.splice(ansIdx,1);
  renderSentQuiz();
}
function checkSent(){
  const c=state.cards[state.current];
  c.checked=true;
  c.correct=c.answer.join(' ')===c.sl.join(' ');
  if(c.correct)state.score++;
  else state.mistakes.push({ru:c.ru,correct:c.sl.join(' '),given:c.answer.join(' ')});
  renderSentQuiz();
}
function nextSent(){
  if(state.current+1>=state.cards.length){renderSentResult();return;}
  state.current++;
  renderSentQuiz();
}
function renderSentResult(){
  const{cards,score,mistakes}=state;const pct=Math.round(score/cards.length*100);
  const emoji=pct===100?"🏆":pct>=80?"🌟":pct>=60?"👍":"💪";
  let mistakesHtml='';
  if(mistakes.length){
    mistakesHtml='<div class="mistakes-block"><div class="mistakes-title">Повтори:</div>';
    mistakes.forEach(function(m){
      mistakesHtml+='<div class="mistake-row" style="flex-direction:column;gap:4px"><span style="color:#5a7a5a;font-size:13px">'+m.ru+'</span><span style="color:#66bb6a;font-weight:600">'+m.correct+'</span></div>';
    });
    mistakesHtml+='</div>';
  }
  app.innerHTML='<div class="result-card sents">'+
    '<div class="result-emoji">'+emoji+'</div><div class="result-title">Раунд окончен!</div>'+
    '<div class="result-score sents">'+score+'/'+cards.length+'</div><div class="result-pct">'+pct+'% правильно</div>'+
    mistakesHtml+
    '<div class="btn-row"><button class="btn-new sents" onclick="startSents()">Новый раунд</button><button class="btn-menu" onclick="goMenu()">Меню</button></div>'+
  '</div>';
}

function goMenu(){state={mode:"menu"};renderMenu();}
function resetProgress(){
  if(!confirm("Сбросить весь прогресс? Это удалит уровни знания всех слов и истории очередей."))return;
  try{localStorage.removeItem("wq");localStorage.removeItem("vq");localStorage.removeItem("wp");}catch(e){}
  wordQueue=shuffle([...WORDS]);wordsSeen=0;
  wordProgress={};
  let combos=[];VERBS.forEach(v=>PRONOUNS.forEach(p=>combos.push({verb:v,pronoun:p})));
  verbQueue=shuffle(combos);verbsSeen=0;
  renderMenu();
}
function exportProgress(){
  try{
    const wq=localStorage.getItem("wq")||"";
    const vq=localStorage.getItem("vq")||"";
    const wp=localStorage.getItem("wp")||"";
    const data={wq,vq,wp,wordsSeen,verbsSeen,date:new Date().toISOString()};
    const json=JSON.stringify(data);
    const dt=new Date().toISOString().slice(0,10);
    const blob=new Blob([json],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`slo-progress-${dt}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    if(navigator.clipboard){
      navigator.clipboard.writeText(json).then(
        ()=>alert("✓ Прогресс сохранён в файл и скопирован в буфер.\nВставь его текст в «📥 Импорт» в новом артефакте."),
        ()=>alert("✓ Прогресс сохранён в файл.\nОткрой его в текстовом редакторе и скопируй содержимое для импорта.")
      );
    } else {
      alert("✓ Прогресс сохранён в файл.\nОткрой его и скопируй содержимое для импорта.");
    }
  }catch(e){alert("Ошибка экспорта: "+e.message);}
}
function importProgress(){
  const txt=prompt("Вставь сюда экспортированный прогресс (JSON):");
  if(!txt)return;
  try{
    const data=JSON.parse(txt.trim());
    if(data.wq)localStorage.setItem("wq",data.wq);
    if(data.vq)localStorage.setItem("vq",data.vq);
    if(data.wp)localStorage.setItem("wp",data.wp);
    loadWordQueue();loadVerbQueue();loadWordProgress();
    renderMenu();
    const learned=Object.values(wordProgress).filter(p=>p.level>=1).length;
    alert("✓ Прогресс восстановлен!\nСлова: "+wordsSeen+"/"+WORDS.length+"\nГлаголы: "+verbsSeen+"/"+(VERBS.length*9)+"\nВ работе: "+learned);
  }catch(e){alert("Ошибка импорта: "+e.message+"\n\nПроверь, что вставил корректный JSON.");}
}
renderMenu();
</script>
